<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @import url('https://fonts.googleapis.com/css?family=Muli&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            background: #111;
            /*#111111*/
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #container {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 100%;
        }

        .square {
            background-color: #1d1d1d;
            box-shadow: 0 0 2px #000;
            margin: 2px;
            width: 36px;
            height: 36px;
            transition: 1s ease;
        }

        .square:hover {
            transition-duration: 0s;
        }
    </style>
    </style>
</head>

<body>
    <div id="container"></div>

</body>

</html>
<script>
    generarDiv();
    /*
    ;
    const input = document.createElement("input");
    input.value = "Insertar div";
    input.type = "button";
    input.onclick = generarDiv;
    div.appendChild(input);
    */

    function generarDiv() {
        const div = document.getElementById("container")
        const cantDiv = parseInt(prompt("¿Cuantos DIV quieres?"));

        for (let i = 0; i < cantDiv; i++) {
            const nuevoDiv = document.createElement("div");
            //div.innerHTML = "Contenedor " + i;
            nuevoDiv.setAttribute("class", "square");
            nuevoDiv.textContent = "Contenedor " + i;
            nuevoDiv.onmouseover = agregarColor;
            nuevoDiv.onmouseout = quitarColor;
            //Añadir los eventos con addEventListener
            nuevoDiv.addEventListener("mouseover", () => {
                agregarColor(div);
            });

            nuevoDiv.addEventListener("mouseout", () => {
                quitarColor(div);
            });
            nuevoDiv.appendChild(nuevoDiv);
        }
    }


    //La función cambiar color, tiene que preguntarme a que div le tengo que cambiar el color, según me diga le aplicaré el style
    function cambiarColor() {
        const cajas = document.querySelectorAll(".prueba"); //NodeList
        let div = prompt("A que div quieres cambiar el color entre el 1 y el " + cajas.length);
        if (div === "") {
            alert("No puede estar vacío");
            cambiarColor();
        } else if (isNaN(parseInt(div))) {
            alert("Tiene que ser un valor numerico");
            cambiarColor();
        } else if (div >= 1 && div <= cajas.length) {
            cajas[div - 1].style.backgroundColor = generarColorAleatorio();
        } else {
            alert("El número tiene que ser entre el 1 y el " + cajas.length);
            cambiarColor();
        }
    }

    // Validar.
    // 1-5 si pone un 6 tiene que darle un mensaje diciendo estás fuera del rango.
    // Tiene que ser un número. Parseint()
    // No puede estar vacío

    function generarColorAleatorio() {
        // Generar un color hexadecimal aleatorio
        const letras = '0123456789ABCDEF';
        let color = '#';

        for (let i = 0; i < 6; i++) {
            color += letras[Math.floor(Math.random() * 16)];
        }

        return color;
    }
</script>
